<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRPM Strategy Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; max-width: 1000px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-info { text-align: center; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 12px; border: 2px solid #dfe3e8; border-radius: 8px; width: 220px; text-transform: uppercase; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .strategy-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: #fff; border: 1px solid #eee; font-size: 14px; }
        .strategy-table th { background: #333; color: #fff; padding: 12px; text-align: left; text-transform: uppercase; }
        .strategy-table td { padding: 12px; border-bottom: 1px solid #eee; }
        #chartContainer { width: 100%; height: 400px; margin: 20px 0; }
        #chat-response { margin-top: 25px; display: none; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .ai-header { background: #333; color: #fff; padding: 10px; text-align: center; font-weight: bold; }
        .ai-body { padding: 20px; line-height: 1.6; background: #fff; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-info">
        <h2 id="main-title">CRPM Quantitative Analysis</h2>
        <div style="margin-top:10px;"><strong>Capital (100 Shares):</strong> $<span id="cap-invested">---</span></div>
    </div>
    
    <div class="input-group">
        <input type="text" id="ticker" placeholder="TICKER">
        <button onclick="calcola()">Run CRPM Analysis</button>
    </div>

    <div id="summary-data" style="text-align:center; font-weight:bold; margin: 20px 0; display:none;">
        Spot: $<span id="spot"></span> | IV: 27% | 1-Sigma: $<span id="low"></span> - $<span id="high"></span>
    </div>

    <div id="chartContainer"><canvas id="probabilityChart"></canvas></div>
    <div id="tables-container"></div>

    <div style="margin-top:40px; border-top:1px solid #eee; padding-top:20px;">
        <h4>CRPM Assistant</h4>
        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Ask AI..." style="width: 70%;">
            <button onclick="askAI()" style="background: #007bff;">Ask Assistant</button>
        </div>
        <div id="chat-response">
            <div class="ai-header">Analytical Response</div>
            <div class="ai-body" id="ai-content-body"></div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    async function calcola() {
        const t = document.getElementById('ticker').value.toUpperCase();
        if(!t) return;
        const resp = await fetch('/api/index?ticker=' + t);
        const data = await resp.json();
        
        document.getElementById('main-title').innerText = data.company;
        document.getElementById('cap-invested').innerText = Number(data.inv_cap).toLocaleString('en-US');
        document.getElementById('summary-data').style.display = 'block';
        document.getElementById('spot').innerText = data.price;
        document.getElementById('low').innerText = data.low;
        document.getElementById('high').innerText = data.high;

        let html = '';
        // Gruppo 1: Macchine 1 & 2
        html += renderTable("BASE STRATEGIES", [data.machines[0], data.machines[1]]);
        // Gruppo 2: Macchine 3 & 4
        html += renderTable("PROTECTION & INCOME", [data.machines[2], data.machines[3]]);
        // Gruppo 3: Macchina 5
        html += renderTable("COMBINED STRATEGY", [data.machines[4]]);
        
        document.getElementById('tables-container').innerHTML = html;
        drawCone(parseFloat(data.price), 0.27);
    }

    function renderTable(title, machines) {
        let table = `<table class="strategy-table"><thead><tr><th colspan="4">${title}</th></tr></thead><tbody>`;
        machines.forEach(m => {
            table += `<tr><td colspan="4" style="background:#f9f9f9; font-weight:bold;">${m.name}</td></tr>
                      <tr><td>Action: ${m.action}</td><td>Strike: $${m.strike}</td><td>Expiry: ${m.expiry}</td><td>Prem: ${m.prem}</td></tr>
                      <tr><td colspan="2">Profit: ${m.max_profit}</td><td colspan="2">Risk: ${m.max_risk}</td></tr>`;
        });
        table += `</tbody></table>`;
        return table;
    }

    async function askAI() {
        const q = document.getElementById('chat-input').value;
        const respDiv = document.getElementById('chat-response');
        const bodyDiv = document.getElementById('ai-content-body');
        respDiv.style.display = 'block';
        bodyDiv.innerHTML = "Analyzing...";
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: q })
        });
        const data = await resp.json();
        bodyDiv.innerHTML = data.response.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function drawCone(price, iv) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        const labels = []; const u = []; const l = []; const s = [];
        for (let d = 0; d <= 30; d++) {
            labels.push(d);
            const move = price * iv * Math.sqrt(d / 365);
            u.push(price + move); l.push(price - move); s.push(price);
        }
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '+1σ Boundary', data: u, borderColor: '#2ecc71', pointRadius: 0, fill: false },
                    { label: '-1σ Boundary', data: l, borderColor: '#e74c3c', pointRadius: 0, fill: false },
                    { label: 'Spot Price', data: s, borderColor: '#ccc', borderDash: [5, 5], pointRadius: 0, fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>

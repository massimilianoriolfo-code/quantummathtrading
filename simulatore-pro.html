<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRPM Strategy Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f9; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 900px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex-grow: 1; }
        button { padding: 10px 20px; background: #000; color: #fff; border: none; cursor: pointer; border-radius: 5px; }
        .strategy-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .strategy-table th, .strategy-table td { border: 1px solid #eee; padding: 12px; text-align: left; }
        .strategy-table th { background: #f8f9fa; }
        #chartContainer { height: 350px; margin: 20px 0; }
        #chat-response { margin-top: 20px; padding: 15px; background: #f0f4f8; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="main-title">CRPM Quantitative Hub</h2>
    <p>Capital (100 shares): $<span id="cap-invested">---</span></p>
    
    <div class="input-group">
        <input type="text" id="ticker" placeholder="Enter Ticker (e.g. NVDA)">
        <button onclick="calcola()">Run CRPM</button>
    </div>

    <div id="summary" style="display:none; text-align:center; font-weight:bold;">
        Spot: $<span id="spot"></span> | 1-Sigma: $<span id="low"></span> - $<span id="high"></span>
    </div>

    <div id="chartContainer"><canvas id="probabilityChart"></canvas></div>
    <div id="tables-container"></div>

    <hr>
    <h4>CRPM Assistant</h4>
    <div class="input-group">
        <input type="text" id="chat-input" placeholder="Ask about the methodology...">
        <button onclick="askAI()" style="background: #007bff;">Ask</button>
    </div>
    <div id="chat-response"></div>
</div>

<script>
    let myChart = null;

    async function calcola() {
        const t = document.getElementById('ticker').value.toUpperCase();
        const response = await fetch('/api/index?ticker=' + t);
        const data = await response.json();
        
        document.getElementById('main-title').innerText = data.company;
        document.getElementById('cap-invested').innerText = data.inv_cap;
        document.getElementById('summary').style.display = 'block';
        document.getElementById('spot').innerText = data.price;
        document.getElementById('low').innerText = data.low;
        document.getElementById('high').innerText = data.high;

        let html = '';
        data.machines.forEach(m => {
            html += `<table class="strategy-table">
                <thead><tr><th colspan="2">${m.name}</th></tr></thead>
                <tbody>
                    <tr><td>Action: ${m.action}</td><td>Strike: $${m.strike}</td></tr>
                    <tr><td>Profit: ${m.max_profit}</td><td>Risk: ${m.max_risk}</td></tr>
                    <tr><td colspan="2">Note: ${m.comment}</td></tr>
                </tbody>
            </table>`;
        });
        document.getElementById('tables-container').innerHTML = html;
        drawChart(parseFloat(data.price), 0.27);
    }

    async function askAI() {
        const q = document.getElementById('chat-input').value;
        const respBox = document.getElementById('chat-response');
        respBox.style.display = 'block';
        respBox.innerHTML = "Analyzing...";
        
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: q })
        });
        const data = await res.json();
        respBox.innerHTML = data.response.replace(/\n/g, '<br>');
    }

    function drawChart(price, iv) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        const labels = []; const upper = []; const lower = [];
        for (let i = 0; i <= 30; i++) {
            labels.push(i);
            const move = price * iv * Math.sqrt(i/365);
            upper.push(price + move); lower.push(price - move);
        }
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '+1σ', data: upper, borderColor: 'green', fill: false },
                    { label: '-1σ', data: lower, borderColor: 'red', fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>

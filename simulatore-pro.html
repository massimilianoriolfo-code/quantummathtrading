<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM - Strategic Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .dashboard { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #e1e8ed; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .main-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 12px; width: 200px; border: 2px solid #dfe3e8; border-radius: 8px; font-size: 16px; text-transform: uppercase; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Machines Grid */
        .machines-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .machine-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; }
        .machine-card h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: #007bff; }
        .pl-canvas { width: 100% !important; height: 120px !important; }
        
        #coneCanvas { height: 400px !important; }
        @media (max-width: 900px) { .main-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <h2 style="text-align:center; margin-top:0;">CRPM Strategic Simulator</h2>
        <div class="input-group">
            <input type="text" id="ticker" placeholder="TICKER (SPY)" maxlength="5">
            <button onclick="runStrategicAnalysis()">Run Analysis</button>
        </div>
        
        <div class="main-row">
            <div id="coneContainer">
                <canvas id="coneCanvas"></canvas>
            </div>
            <div id="statsBox" style="background:#f8f9fa; padding:15px; border-radius:12px; font-size:0.9rem; display:none;">
                <h3 id="tickerTitle" style="margin-top:0;">---</h3>
                <p>Spot Price: <span id="statPrice">--</span></p>
                <p>ATM IV: <span id="statIV">--</span></p>
                <p>1σ High: <span id="statHigh">--</span></p>
                <p>1σ Low: <span id="statLow">--</span></p>
            </div>
        </div>

        <div class="machines-grid" id="machinesSection" style="display:none;">
            <div class="machine-card">
                <h4>1. Short Put (CRPM)</h4>
                <canvas id="pl-shortput" class="pl-canvas"></canvas>
            </div>
            <div class="machine-card">
                <h4>2. Covered Call</h4>
                <canvas id="pl-coveredcall" class="pl-canvas"></canvas>
            </div>
            <div class="machine-card">
                <h4>3. Bull Put Spread</h4>
                <canvas id="pl-bullput" class="pl-canvas"></canvas>
            </div>
            <div class="machine-card">
                <h4>4. Iron Condor</h4>
                <canvas id="pl-ironcondor" class="pl-canvas"></canvas>
            </div>
            <div class="machine-card">
                <h4>5. Bear Call Spread</h4>
                <canvas id="pl-bearcall" class="pl-canvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    let charts = {};

    async function runStrategicAnalysis() {
        const t = document.getElementById('ticker').value.toUpperCase();
        if(!t) return;

        try {
            const response = await fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ticker: t })
            });
            const data = await response.json();

            // Update Stats
            document.getElementById('statsBox').style.display = 'block';
            document.getElementById('machinesSection').style.display = 'grid';
            document.getElementById('tickerTitle').innerText = data.ticker;
            document.getElementById('statPrice').innerText = "$" + data.price;
            document.getElementById('statIV').innerText = data.volatility + "%";
            document.getElementById('statHigh').innerText = "$" + data.high;
            document.getElementById('statLow').innerText = "$" + data.low;

            drawCone(data.price, data.volatility / 100);
            drawPLProfiles(data.price, data.low, data.high);
        } catch (e) { alert("Error loading data."); }
    }

    function drawCone(price, iv) {
        const ctx = document.getElementById('coneCanvas').getContext('2d');
        const labels = []; const upper = []; const lower = []; const spot = [];
        const today = new Date();
        for (let d = 0; d <= 30; d++) {
            const dt = new Date(today); dt.setDate(today.getDate() + d);
            labels.push(dt.toLocaleDateString('en-US', {day:'2-digit', month:'short'}));
            const move = price * iv * Math.sqrt(d/365);
            upper.push(price + move); lower.push(price - move); spot.push(price);
        }
        if(charts['cone']) charts['cone'].destroy();
        charts['cone'] = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [
                { label: '+1σ', data: upper, borderColor: '#2ecc71', pointRadius:0, fill:false, tension:0.4 },
                { label: '-1σ', data: lower, borderColor: '#e74c3c', pointRadius:0, fill:'-1', backgroundColor:'rgba(46,204,113,0.05)', tension:0.4 },
                { label: 'Spot', data: spot, borderColor: '#ccc', borderDash:[5,5], pointRadius:0, fill:false }
            ]},
            options: { responsive:true, maintainAspectRatio:false, scales: { x:{ ticks:{autoSkip:true, maxTicksLimit:6} } } }
        });
    }

    function drawPLProfiles(price, low, high) {
        const configs = [
            { id: 'pl-shortput', fn: (x) => (x < low ? (x - low) + 2 : 2) },
            { id: 'pl-coveredcall', fn: (x) => (x > high ? 5 : (x - price) + 2) },
            { id: 'pl-bullput', fn: (x) => (x < low - 5 ? -3 : (x < low ? x - low : 2)) },
            { id: 'pl-ironcondor', fn: (x) => (x < low || x > high ? -2 : 3) },
            { id: 'pl-bearcall', fn: (x) => (x > high ? -3 : (x > high - 5 ? high - x : 2)) }
        ];

        configs.forEach(conf => {
            const ctx = document.getElementById(conf.id).getContext('2d');
            const dataP = []; const labels = [];
            for(let i = price*0.8; i <= price*1.2; i += price*0.01) {
                labels.push(""); dataP.push(conf.fn(i));
            }
            if(charts[conf.id]) charts[conf.id].destroy();
            charts[conf.id] = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data: dataP, borderColor: '#333', borderWidth: 2, fill: true, backgroundColor: (c) => c.tickValue < 0 ? 'rgba(231,76,60,0.1)' : 'rgba(46,204,113,0.1)', pointRadius:0, tension:0.1 }]},
                options: { responsive:true, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{grid:{display:false}, ticks:{display:false}}} }
            });
        });
    }
</script>
</body>
</html>

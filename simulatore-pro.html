<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM Strategy Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* ... (Stili precedenti invariati per mantenere il layout approvato) ... */
        .ai-body { padding: 25px; line-height: 1.8; font-size: 1rem; color: #2c3e50; }
        .ai-body strong { color: #000; font-weight: 700; display: block; margin-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <!-- ... (Header e Input precedenti) ... -->

    <div id="chat-section">
        <h4 style="margin-bottom:15px; color: #333;">Ask the CRPM Assistant</h4>
        <div class="input-group">
            <input type="text" id="chat-input" placeholder="What to do with 100 MSFT in portfolio?" style="width: 75%;">
            <button onclick="askAI()" style="background: #007bff;">Ask Assistant</button>
        </div>
        <div id="chat-response">
            <div class="ai-header">Analytical Engine Response</div>
            <div class="ai-body" id="ai-content-body"></div>
        </div>
    </div>
</div>

<script>
    // ... (Funzione calcola precedente) ...

    async function askAI() {
        const query = document.getElementById('chat-input').value;
        const respDiv = document.getElementById('chat-response');
        const bodyDiv = document.getElementById('ai-content-body');
        respDiv.style.display = 'block';
        bodyDiv.innerHTML = "<em>Analyzing methodology and calculating expected values...</em>";
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: query })
        });
        const data = await response.json();
        
        // Formattazione pulita: trasforma i grassetti e gestisce LaTeX
        let formatted = data.response
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
            
        bodyDiv.innerHTML = formatted;
        
        // Forza MathJax a renderizzare le formule caricate dinamicamente
        if (window.MathJax) {
            MathJax.typesetPromise([bodyDiv]);
        }
    }
</script>
</body>
</html>

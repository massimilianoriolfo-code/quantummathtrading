<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM - The Options Probability Cone & Machines</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 16px; border: 1px solid #e1e8ed; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header-info { text-align: center; margin-bottom: 25px; }
        .current-date { font-size: 0.9rem; color: #888; margin-top: 5px; font-weight: 500; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 12px; width: 250px; border: 2px solid #dfe3e8; border-radius: 8px; font-size: 16px; text-transform: uppercase; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Main Chart Area */
        #chartContainer { width: 100%; height: 450px; background: #fff; border-radius: 12px; padding: 10px; margin-bottom: 30px; }
        
        /* Machines Grid */
        .machines-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; display: none; }
        .machine-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .machine-card h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: #2563eb; }
        .pl-canvas { height: 110px !important; width: 100% !important; }
        .trade-label { font-size: 0.75rem; color: #666; margin-top: 8px; line-height: 1.3; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-info">
            <h2 style="margin:0; letter-spacing: -0.5px;">The Options Probability Cone</h2>
            <div class="current-date">Analysis Date: April 28, 2026</div>
        </div>
        
        <div class="input-group">
            <input type="text" id="ticker" placeholder="Enter Ticker (e.g. SPY)" maxlength="5">
            <button onclick="executeAnalysis()">Generate Strategy</button>
        </div>
        
        <div id="res"></div>

        <div id="chartContainer">
            <canvas id="probabilityChart"></canvas>
        </div>

        <div class="machines-grid" id="machinesSection">
            <div class="machine-card">
                <h4>Short Put</h4>
                <canvas id="pl-sp" class="pl-canvas"></canvas>
                <div class="trade-label" id="txt-sp"></div>
            </div>
            <div class="machine-card">
                <h4>Covered Call</h4>
                <canvas id="pl-cc" class="pl-canvas"></canvas>
                <div class="trade-label" id="txt-cc"></div>
            </div>
            <div class="machine-card">
                <h4>Bull Put Spread</h4>
                <canvas id="pl-bps" class="pl-canvas"></canvas>
                <div class="trade-label" id="txt-bps"></div>
            </div>
            <div class="machine-card">
                <h4>Iron Condor</h4>
                <canvas id="pl-ic" class="pl-canvas"></canvas>
                <div class="trade-label" id="txt-ic"></div>
            </div>
            <div class="machine-card">
                <h4>Bear Call Spread</h4>
                <canvas id="pl-bcs" class="pl-canvas"></canvas>
                <div class="trade-label" id="txt-bcs"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let masterCharts = {};
    const analysisDate = new Date("2026-04-28");

    async function executeAnalysis() {
        const t = document.getElementById('ticker').value.toUpperCase();
        if(!t) return;
        
        const resDiv = document.getElementById('res');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "<p style='text-align:center;'><em>Interrogating CRPM Market Nodes...</em></p>";

        try {
            const response = await fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ticker: t })
            });
            const data = await response.json();

            // IV FALLBACK LOGIC: If markets are closed and IV is 0, use a baseline (e.g., 18%)
            let validIV = data.volatility;
            if (!validIV || validIV < 0.1) {
                validIV = 18.0; // Typical baseline for indices
                console.warn("Market Closed: Using baseline IV for projection.");
            }

            resDiv.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                    <div style="text-align:right;"><strong>Asset:</strong> ${data.ticker} | <strong>Price:</strong> $${data.price}</div>
                    <div style="text-align:left;"><strong>30d IV (Ref):</strong> ${validIV}%</div>
                </div>`;
            
            document.getElementById('machinesSection').style.display = 'grid';
            
            drawCone(data.price, validIV / 100);
            drawMachines(data.price, data.low, data.high);

        } catch (e) {
            resDiv.innerHTML = "<p style='color:orange; text-align:center;'>API Timeout. Please retry.</p>";
        }
    }

    function drawCone(price, iv) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        const labels = []; const u = []; const dLine = []; const s = [];
        
        for (let d = 0; d <= 30; d++) {
            const dt = new Date(analysisDate); dt.setDate(analysisDate.getDate() + d);
            labels.push(d % 5 === 0 ? dt.toLocaleDateString('en-US', {day:'2-digit', month:'short'}) : '');
            const move = price * iv * Math.sqrt(d/365);
            u.push(price + move); dLine.push(price - move); s.push(price);
        }

        if(masterCharts['cone']) masterCharts['cone'].destroy();
        masterCharts['cone'] = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [
                { label: '+1σ', data: u, borderColor: '#2ecc71', pointRadius: 0, fill: false, tension: 0.45 },
                { label: '-1σ', data: dLine, borderColor: '#e74c3c', pointRadius: 0, fill: '-1', backgroundColor: 'rgba(46,204,113,0.06)', tension: 0.45 },
                { label: 'Spot', data: s, borderColor: '#bdc3c7', borderDash:[5,5], pointRadius:0, fill:false }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
        });
    }

    function drawMachines(price, low, high) {
        const configs = [
            { id: 'pl-sp', txt: 'txt-sp', label: 'Sell Put @'+low.toFixed(0), fn: x => x < low ? x - low : 5 },
            { id: 'pl-cc', txt: 'txt-cc', label: 'Sell Call @'+high.toFixed(0), fn: x => x > high ? high - price + 5 : x - price + 5 },
            { id: 'pl-bps', txt: 'txt-bps', label: 'Credit Spread', fn: x => x < low - 10 ? -10 : (x < low ? (x - low) * 2 : 5) },
            { id: 'pl-ic', txt: 'txt-ic', label: 'Iron Condor', fn: x => (x < low || x > high) ? -10 : 10 },
            { id: 'pl-bcs', txt: 'txt-bcs', label: 'Bear Call', fn: x => x > high + 10 ? -10 : (x > high ? (high - x) * 2 : 5) }
        ];

        configs.forEach(c => {
            document.getElementById(c.txt).innerText = c.label;
            const ctx = document.getElementById(c.id).getContext('2d');
            const dataPts = []; const lbls = [];
            for(let x = price*0.85; x <= price*1.15; x += price*0.01) { lbls.push(""); dataPts.push(c.fn(x)); }
            
            if(masterCharts[c.id]) masterCharts[c.id].destroy();
            masterCharts[c.id] = new Chart(ctx, {
                type: 'line',
                data: { labels: lbls, datasets: [{ data: dataPts, borderColor: '#000', borderWidth: 1.5, fill: true, 
                    backgroundColor: ctx => ctx.parsed.y >= 0 ? 'rgba(46,204,113,0.15)' : 'rgba(231,76,60,0.15)', pointRadius: 0, tension: 0.1 }]},
                options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{display:false}} }
            });
        });
    }
</script>
</body>
</html>

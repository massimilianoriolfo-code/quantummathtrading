<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM - Simulatore Cono di Probabilità</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #111; color: #eee; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 16px; max-width: 800px; margin: auto; border: 1px solid #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; flex: 1; border: 1px solid #444; background: #222; color: #fff; border-radius: 8px; font-size: 16px; text-transform: uppercase; }
        button { padding: 12px 24px; background: #007bff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #res { background: #222; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; display: none; }
        .range-highlight { color: #007bff; font-size: 1.2em; font-weight: bold; }
        #chartContainer { width: 100%; height: 400px; background: #000; border-radius: 12px; padding: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">CRPM Probable Price Cone (30 Days)</h2>
    
    <div class="input-group">
        <input type="text" id="ticker" placeholder="Es: SPY" maxlength="5">
        <button onclick="calcola()">Genera Cono</button>
    </div>
    
    <div id="res"></div>

    <div id="chartContainer">
        <canvas id="probabilityChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    async function calcola() {
        const t = document.getElementById('ticker').value.toUpperCase();
        const resDiv = document.getElementById('res');
        if(!t) return;

        resDiv.style.display = 'block';
        resDiv.innerHTML = "<em>Analisi quantitativa in corso...</em>";

        try {
            const response = await fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ticker: t })
            });
            const data = await response.json();

            if(data.error) {
                resDiv.innerHTML = `<p style="color:red;">${data.error}</p>`;
            } else {
                resDiv.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div><strong>Ticker:</strong> ${data.ticker} | <strong>Price:</strong> $${data.price}</div>
                        <div><strong>IV 30gg:</strong> ${data.volatility}%</div>
                    </div>
                    <div style="margin-top:10px; border-top:1px solid #444; padding-top:10px;">
                        Target 30gg (1σ): <span class="range-highlight">$${data.low} - $${data.high}</span>
                    </div>`;
                
                disegnaConoDinamico(data.price, data.volatility / 100);
            }
        } catch (e) {
            resDiv.innerHTML = "Errore di connessione.";
        }
    }

    function disegnaConoDinamico(currentPrice, iv) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        const labels = [];
        const upperBand = [];
        const lowerBand = [];
        const centerLine = [];

        // Calcoliamo i dati per ogni giorno (da 0 a 30)
        for (let d = 0; d <= 30; d++) {
            labels.push("G+" + d);
            const move = currentPrice * iv * Math.sqrt(d / 365);
            upperBand.push(currentPrice + move);
            lowerBand.push(currentPrice - move);
            centerLine.push(currentPrice);
        }

        if (myChart) { myChart.destroy(); }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Upper 1σ',
                        data: upperBand,
                        borderColor: 'rgba(0, 123, 255, 0.8)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Lower 1σ',
                        data: lowerBand,
                        borderColor: 'rgba(0, 123, 255, 0.8)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: '-1', // Riempie lo spazio tra Upper e Lower
                        backgroundColor: 'rgba(0, 123, 255, 0.15)'
                    },
                    {
                        label: 'Prezzo Attuale',
                        data: centerLine,
                        borderColor: 'rgba(255, 255, 255, 0.3)',
                        borderDash: [5, 5],
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        grid: { color: '#333' },
                        ticks: { color: '#aaa' }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#aaa', maxRotation: 0 }
                    }
                }
            }
        });
    }
</script>
</body>
</html>

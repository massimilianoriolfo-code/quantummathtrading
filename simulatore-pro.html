<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM Strategy Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; max-width: 1000px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-info { text-align: center; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 12px; border: 2px solid #dfe3e8; border-radius: 8px; width: 200px; font-size: 16px; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Stile Tabelle Vere */
        .strategy-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        .strategy-table th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        .strategy-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .strategy-table tr:last-child td { border-bottom: none; }
        
        .unlimited { color: #28a745; font-weight: bold; }
        .risk-val { color: #dc3545; font-weight: bold; }
        #chartContainer { width: 100%; height: 400px; margin: 20px 0; }
        #chat-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-info">
        <h2 id="main-title">CRPM Quantitative Analysis</h2>
        <div id="display-date" style="color:#888;">May 04, 2026</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="ticker" placeholder="ES. MSFT" maxlength="5">
        <button onclick="calcola()">Genera Analisi</button>
    </div>

    <div id="summary-data" style="text-align:center; font-weight:bold; margin-bottom:10px; display:none;">
        Spot: $<span id="spot"></span> | IV: <span id="iv"></span>% | Range 30gg: $<span id="low"></span> - $<span id="high"></span>
    </div>

    <div id="chartContainer"><canvas id="probabilityChart"></canvas></div>

    <div id="tables-container"></div>

    <div id="chat-section">
        <h4>Chiedi all'Assistente del Libro</h4>
        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Come proteggo MSFT?" style="width: 70%;">
            <button onclick="askAI()" style="background: #007bff;">Chiedi</button>
        </div>
        <div id="chat-response" style="margin-top:15px; padding:15px; background:#f8f9fa; border-radius:8px; display:none;"></div>
    </div>
</div>

<script>
    let myChart = null;

    async function calcola() {
        const t = document.getElementById('ticker').value.toUpperCase();
        if(!t) return;
        
        const response = await fetch('/api/index?ticker=' + t);
        const data = await response.json();
        
        document.getElementById('main-title').innerText = data.company;
        document.getElementById('summary-data').style.display = 'block';
        document.getElementById('spot').innerText = data.price;
        document.getElementById('iv').innerText = data.volatility;
        document.getElementById('low').innerText = data.low;
        document.getElementById('high').innerText = data.high;

        // Generazione Tabelle Vere
        let html = '';
        data.machines.forEach(m => {
            html += `
            <table class="strategy-table">
                <thead><tr><th colspan="2">${m.name}</th></tr></thead>
                <tbody>
                    <tr><td>Target / Strike</td><td><strong>$${m.target}</strong></td></tr>
                    <tr><td>Scadenza</td><td>${m.expiry}</td></tr>
                    <tr><td>Profitto Potenziale</td><td class="${m.profit === 'UNLIMITED' ? 'unlimited' : ''}">${m.profit}</td></tr>
                    <tr><td>Rischio Massimo</td><td class="risk-val">${m.risk}</td></tr>
                </tbody>
            </table>`;
        });
        document.getElementById('tables-container').innerHTML = html;
        
        drawProbabilityCone(data.price, data.volatility / 100);
    }

    async function askAI() {
        const query = document.getElementById('chat-input').value;
        const respDiv = document.getElementById('chat-response');
        respDiv.style.display = 'block';
        respDiv.innerHTML = "<em>Ricerca nel libro...</em>";
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: query })
        });
        const data = await response.json();
        respDiv.innerHTML = "<strong>Assistente:</strong> " + data.response;
    }

    function drawProbabilityCone(price, iv) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        const labels = []; const u = []; const l = [];
        for (let d = 0; d <= 30; d++) {
            labels.push("G "+d);
            const move = price * iv * Math.sqrt(d / 365);
            u.push(price + move); l.push(price - move);
        }
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '+1σ', data: u, borderColor: '#2ecc71', pointRadius: 0, fill: false },
                    { label: '-1σ', data: l, borderColor: '#e74c3c', pointRadius: 0, fill: '-1', backgroundColor: 'rgba(46, 204, 113, 0.05)' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>

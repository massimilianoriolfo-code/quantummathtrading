<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM Strategy Hub - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; max-width: 1000px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-info { text-align: center; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 12px; border: 2px solid #dfe3e8; border-radius: 8px; width: 200px; font-size: 16px; text-transform: uppercase; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .strategy-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #eee; font-size: 14px; }
        .strategy-table th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        .strategy-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .action-buy { color: #007bff; font-weight: bold; }
        .action-sell { color: #dc3545; font-weight: bold; }
        .unlimited { color: #28a745; font-weight: bold; }
        .comment-cell { font-style: italic; color: #555; background: #fafafa; }
        #chartContainer { width: 100%; height: 450px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-info">
        <h2 id="main-title">CRPM Quantitative Analysis</h2>
        <div id="display-date" style="color:#888;">May 04, 2026</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="ticker" placeholder="E.G. MA" maxlength="5">
        <button onclick="calcola()">Run Full Analysis</button>
    </div>

    <div id="summary-data" style="text-align:center; font-weight:bold; margin-bottom:10px; display:none;">
        Spot: $<span id="spot"></span> | IV: <span id="iv"></span>% | 30-Day Range: $<span id="low"></span> - $<span id="high"></span>
    </div>

    <div id="chartContainer"><canvas id="probabilityChart"></canvas></div>
    <div id="tables-container"></div>
</div>

<script>
    let myChart = null;

    async function calcola() {
        const t = document.getElementById('ticker').value.toUpperCase();
        if(!t) return;
        const response = await fetch('/api/index?ticker=' + t);
        const data = await response.json();
        
        document.getElementById('main-title').innerText = data.company;
        document.getElementById('summary-data').style.display = 'block';
        document.getElementById('spot').innerText = data.price;
        document.getElementById('iv').innerText = data.volatility;
        document.getElementById('low').innerText = data.low;
        document.getElementById('high').innerText = data.high;

        let html = '';
        data.machines.forEach(m => {
            html += `
            <table class="strategy-table">
                <thead><tr><th colspan="4" style="background:#333; color:#fff;">${m.name}</th></tr></thead>
                <tbody>
                    <tr>
                        <td width="25%"><strong>Action:</strong> <span class="${m.action === 'BUY' ? 'action-buy' : 'action-sell'}">${m.action} ${m.instrument}</span></td>
                        <td width="25%"><strong>Strike:</strong> $${m.strike}</td>
                        <td width="25%"><strong>Expiry:</strong> ${m.expiry}</td>
                        <td width="25%"><strong>Est. Premium:</strong> $${m.premium}</td>
                    </tr>
                    <tr>
                        <td><strong>Profit:</strong> <span class="${m.profit === 'UNLIMITED' ? 'unlimited' : ''}">${m.profit}</span></td>
                        <td><strong>Max Risk:</strong> ${m.risk}</td>
                        <td colspan="2" class="comment-cell"><strong>Comment:</strong> ${m.comment}</td>
                    </tr>
                </tbody>
            </table>`;
        });
        document.getElementById('tables-container').innerHTML = html;
        drawProbabilityCone(data.price, data.volatility / 100);
    }

    function drawProbabilityCone(price, iv) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        const labels = []; const u = []; const l = []; const s = [];
        const today = new Date("2026-05-04");
        for (let d = 0; d <= 30; d++) {
            const date = new Date(today);
            date.setDate(today.getDate() + d);
            labels.push(date.toLocaleDateString('en-US', { day: 'numeric', month: 'short' }));
            const move = price * iv * Math.sqrt(d / 365);
            u.push(price + move); l.push(price - move); s.push(price);
        }
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '+1σ Boundary', data: u, borderColor: '#2ecc71', pointRadius: 0, fill: false, tension: 0.3 },
                    { label: '-1σ Boundary', data: l, borderColor: '#e74c3c', pointRadius: 0, fill: '-1', backgroundColor: 'rgba(46, 204, 113, 0.05)', tension: 0.3 },
                    { label: 'Spot Price', data: s, borderColor: '#bdc3c7', borderDash: [5, 5], pointRadius: 0, fill: false }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { tooltip: { mode: 'index', intersect: false } }
            }
        });
    }
</script>
</body>
</html>

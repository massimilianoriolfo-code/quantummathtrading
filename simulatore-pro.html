<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM Strategic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .main-chart { height: 400px; margin-bottom: 30px; }
        
        .machines-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .machine { background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; }
        .machine h4 { margin: 0 0 10px 0; font-size: 0.85rem; color: #2563eb; }
        .pl-canvas { height: 100px !important; width: 100% !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="search-box">
            <input type="text" id="ticker" placeholder="ENTER TICKER (E.G. SPY)">
            <button onclick="runCRPM()">GENERATE STRATEGY</button>
        </div>
        
        <div class="main-chart">
            <canvas id="coneCanvas"></canvas>
        </div>

        <div class="machines-grid" id="machines" style="display:none;">
            <div class="machine"><h4>Short Put</h4><canvas id="pl-sp" class="pl-canvas"></canvas></div>
            <div class="machine"><h4>Covered Call</h4><canvas id="pl-cc" class="pl-canvas"></canvas></div>
            <div class="machine"><h4>Bull Put Spread</h4><canvas id="pl-bps" class="pl-canvas"></canvas></div>
            <div class="machine"><h4>Iron Condor</h4><canvas id="pl-ic" class="pl-canvas"></canvas></div>
            <div class="machine"><h4>Bear Call Spread</h4><canvas id="pl-bcs" class="pl-canvas"></canvas></div>
        </div>
    </div>
</div>

<script>
    let charts = {};
    const today = new Date("2026-04-28");

    async function runCRPM() {
        const t = document.getElementById('ticker').value.toUpperCase();
        if(!t) return;
        try {
            const res = await fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ticker: t })
            });
            const data = await res.json();
            document.getElementById('machines').style.display = 'grid';
            drawCone(data.price, data.volatility / 100);
            drawMachines(data.price, data.low, data.high);
        } catch (e) { alert("Server Busy. Retry."); }
    }

    function drawCone(price, iv) {
        const ctx = document.getElementById('coneCanvas').getContext('2d');
        const labels = []; const u = []; const d = []; const s = [];
        for (let i = 0; i <= 30; i++) {
            const dt = new Date(today); dt.setDate(today.getDate() + i);
            labels.push(i % 5 === 0 ? dt.toLocaleDateString('en-US', {day:'2-digit', month:'short'}) : '');
            const move = price * iv * Math.sqrt(i/365);
            u.push(price + move); d.push(price - move); s.push(price);
        }
        if(charts['cone']) charts['cone'].destroy();
        charts['cone'] = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [
                { label: '+1σ', data: u, borderColor: '#2ecc71', pointRadius: 0, fill: false, tension: 0.4 },
                { label: '-1σ', data: d, borderColor: '#e74c3c', pointRadius: 0, fill: '-1', backgroundColor: 'rgba(46,204,113,0.05)', tension: 0.4 },
                { label: 'Spot', data: s, borderColor: '#ccc', borderDash: [5,5], pointRadius: 0, fill: false }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function drawMachines(price, low, high) {
        const configs = [
            { id: 'pl-sp', fn: x => x < low ? x - low + 5 : 5 }, // Short Put
            { id: 'pl-cc', fn: x => x > high ? high - price + 5 : x - price + 5 }, // Covered Call
            { id: 'pl-bps', fn: x => x < low - 10 ? -10 : (x < low ? (x - low) * 2 : 5) }, // Bull Put
            { id: 'pl-ic', fn: x => (x < low || x > high) ? -10 : 10 }, // Iron Condor
            { id: 'pl-bcs', fn: x => x > high + 10 ? -10 : (x > high ? (high - x) * 2 : 5) } // Bear Call
        ];

        configs.forEach(c => {
            const ctx = document.getElementById(c.id).getContext('2d');
            const data = []; const labels = [];
            for(let x = price*0.85; x <= price*1.15; x += price*0.01) { labels.push(""); data.push(c.fn(x)); }
            if(charts[c.id]) charts[c.id].destroy();
            charts[c.id] = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data, borderColor: '#000', borderWidth: 2, fill: true, backgroundColor: ctx => ctx.parsed.y >= 0 ? 'rgba(46,204,113,0.2)' : 'rgba(231,76,60,0.2)', pointRadius: 0, tension: 0.1 }]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        });
    }
</script>
</body>
</html>

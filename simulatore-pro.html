<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPM - The Options Probability Cone</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; max-width: 1000px; margin: auto; border: 1px solid #e1e8ed; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-info { text-align: center; margin-bottom: 25px; }
        .current-date { font-size: 0.9rem; color: #888; margin-top: 5px; font-weight: 500; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { padding: 12px; width: 250px; border: 2px solid #dfe3e8; border-radius: 8px; font-size: 16px; text-transform: uppercase; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #333; }
        #res { background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #e1e8ed; margin-bottom: 20px; display: none; }
        .range-highlight { color: #007bff; font-size: 1.3em; font-weight: bold; }
        #ai-box { margin-top: 20px; padding: 20px; background: #fff; border-left: 4px solid #000; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); display: none; line-height: 1.6; }
        #chartContainer { width: 100%; height: 500px; background: #fff; border-radius: 12px; padding: 10px; position: relative; margin-top: 20px; }
        .footer-note { background: #fff9e6; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; font-size: 0.9rem; border: 1px dashed #d4a017; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-info">
        <h2 style="margin:0; letter-spacing: -0.5px;">The Options Probability Cone</h2>
        <div id="display-date" class="current-date"></div>
    </div>
    
    <div class="input-group">
        <input type="text" id="ticker" placeholder="Enter Ticker (e.g. SPY)" maxlength="5">
        <button onclick="calcola()">Generate Analysis</button>
    </div>
    
    <div id="res"></div>

    <div id="chartContainer">
        <canvas id="probabilityChart"></canvas>
    </div>

    <div id="ai-box">
        <h4 style="margin-top:0;">CRPM Agent Analysis</h4>
        <div id="ai-content"></div>
    </div>

    <div class="footer-note">
        <strong>CRPM Quantitative Model:</strong> 30-Day Forecast based on Implied Volatility and the Square Root of Time (1σ - 68.2% Confidence).
    </div>
</div>

<script>
    // Data di oggi fissa come da istruzioni
    document.getElementById('display-date').innerText = "Analysis Date: May 1, 2026";

    let myChart = null;

    async function calcola() {
        const t = document.getElementById('ticker').value.toUpperCase();
        const resDiv = document.getElementById('res');
        const aiBox = document.getElementById('ai-box');
        const aiContent = document.getElementById('ai-content');
        
        if(!t) return;

        resDiv.style.display = 'block';
        resDiv.innerHTML = "<p style='text-align:center;'><em>Interrogating Option Chains & Running Quantitative Models...</em></p>";
        aiBox.style.display = 'none';

        try {
            const response = await fetch('/api/index', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ticker: t })
            });
            const data = await response.json();

            if(data.error) {
                resDiv.innerHTML = `<p style="color:red; text-align:center;">${data.error}</p>`;
            } else {
                // Estrazione dati per il grafico (Hover perfetto)
                const labels = data.cone_series.map(d => "Day " + d.day);
                const upperData = data.cone_series.map(d => d.high);
                const lowerData = data.cone_series.map(d => d.low);
                const centerData = data.cone_series.map(d => d.reference);

                resDiv.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div style="text-align:right;"><strong>Asset:</strong> ${data.ticker} | <strong>Spot:</strong> $${data.current_price}</div>
                        <div style="text-align:left;"><strong>IV Annualized:</strong> ${data.iv_annual}%</div>
                    </div>
                    <div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px; text-align:center;">
                        Expected 30-Day Range (1σ): <span class="range-highlight">$${data.cone_series[29].low} - $${data.cone_series[29].high}</span>
                    </div>`;
                
                if(data.ai_analysis) {
                    aiBox.style.display = 'block';
                    aiContent.innerHTML = data.ai_analysis.replace(/\n/g, '<br>');
                }
                
                renderInteractiveChart(labels, upperData, lowerData, centerData);
            }
        } catch (e) {
            resDiv.innerHTML = "<p style='color:orange; text-align:center;'>Connection Error. Please verify API status.</p>";
        }
    }

    function renderInteractiveChart(labels, upper, lower, center) {
        const ctx = document.getElementById('probabilityChart').getContext('2d');
        
        if (myChart) { myChart.destroy(); }
        
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: 'Upper Boundary (+1σ)', 
                        data: upper, 
                        borderColor: '#2ecc71', 
                        backgroundColor: 'rgba(46, 204, 113, 0.1)', 
                        fill: false, 
                        pointRadius: 0, 
                        pointHoverRadius: 5,
                        tension: 0.3 
                    },
                    { 
                        label: 'Lower Boundary (-1σ)', 
                        data: lower, 
                        borderColor: '#e74c3c', 
                        fill: '-1', 
                        backgroundColor: 'rgba(46, 204, 113, 0.05)', 
                        pointRadius: 0, 
                        pointHoverRadius: 5,
                        tension: 0.3 
                    },
                    { 
                        label: 'Current Spot Price', 
                        data: center, 
                        borderColor: '#bdc3c7', 
                        borderDash: [5, 5], 
                        fill: false, 
                        pointRadius: 0 
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleFont: { size: 14 },
                        bodyFont: { size: 13 },
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                return " " + context.dataset.label + ": $" + context.parsed.y.toFixed(2);
                            }
                        }
                    },
                    legend: { 
                        position: 'top',
                        labels: { usePointStyle: true, boxWidth: 6 }
                    }
                },
                scales: {
                    y: { 
                        grid: { color: '#f0f0f0' },
                        ticks: { callback: value => '$' + value.toLocaleString() }
                    },
                    x: {
                        grid: { display: false }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
